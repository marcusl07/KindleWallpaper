name: KindleWall
options:
  createIntermediateGroups: true
  xcodeVersion: "15.4"
  objectVersion: 56
settings:
  base:
    SWIFT_VERSION: 5.0
    MACOSX_DEPLOYMENT_TARGET: 13.0
    DEVELOPMENT_TEAM: ""
packages:
  GRDB:
    url: https://github.com/groue/GRDB.swift.git
    from: 6.0.0
targets:
  KindleWall:
    type: application
    platform: macOS
    deploymentTarget: "13.0"
    sources:
      - App
      - Models
      - Parsing
    info:
      path: App/Info.plist
      properties:
        LSUIElement: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.marcuslo.KindleWall
        PRODUCT_NAME: KindleWall
        GENERATE_INFOPLIST_FILE: NO
    dependencies:
      - package: GRDB
        product: GRDB
      - target: DisplayHelper
        embed: false
    scheme:
      testTargets: []
    postBuildScripts:
      - name: Embed DisplayHelper Login Item
        script: |
          set -euo pipefail
          LOGIN_ITEMS_DIR="$TARGET_BUILD_DIR/$CONTENTS_FOLDER_PATH/Library/LoginItems"
          mkdir -p "$LOGIN_ITEMS_DIR"
          ditto "$BUILT_PRODUCTS_DIR/DisplayHelper.app" "$LOGIN_ITEMS_DIR/DisplayHelper.app"
  DisplayHelper:
    type: application
    platform: macOS
    deploymentTarget: "13.0"
    sources:
      - DisplayHelper
      - path: App/AppSupportPaths.swift
      - path: App/ScheduleSettings.swift
      - path: App/WallpaperAssignmentStore.swift
      - path: App/WallpaperSetter.swift
      - path: App/DisplayIdentityResolver.swift
      - path: App/WallpaperTopologyRestorer.swift
      - path: App/DisplayTopologyCoordinator.swift
    info:
      path: DisplayHelper/Info.plist
      properties:
        LSUIElement: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.marcuslo.KindleWall.DisplayHelper
        PRODUCT_NAME: DisplayHelper
        GENERATE_INFOPLIST_FILE: NO
        OTHER_SWIFT_FLAGS: "$(inherited) -D DISPLAY_HELPER"
